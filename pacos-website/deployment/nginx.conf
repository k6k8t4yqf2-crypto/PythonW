# PaCos GmbH - nginx Konfiguration
# Speichern unter: /etc/nginx/sites-available/pacos-website
# Aktivieren: ln -s /etc/nginx/sites-available/pacos-website /etc/nginx/sites-enabled/

# HTTP -> HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name pacos-gmbh.de www.pacos-gmbh.de;
    return 301 https://pacos-gmbh.de$request_uri;
}

# www -> non-www Redirect
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.pacos-gmbh.de;

    ssl_certificate /etc/letsencrypt/live/pacos-gmbh.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pacos-gmbh.de/privkey.pem;

    return 301 https://pacos-gmbh.de$request_uri;
}

# Hauptkonfiguration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pacos-gmbh.de;

    # SSL-Zertifikate (Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/pacos-gmbh.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pacos-gmbh.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip-Kompression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Statische Assets mit Long-Cache (Next.js hashed filenames)
    location /_next/static/ {
        alias /var/www/pacos-website/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public-Verzeichnis (Bilder, Dokumente, etc.)
    location /images/ {
        alias /var/www/pacos-website/public/images/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /documents/ {
        alias /var/www/pacos-website/public/documents/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # robots.txt und favicon
    location = /robots.txt {
        alias /var/www/pacos-website/public/robots.txt;
        access_log off;
    }

    location = /favicon.ico {
        alias /var/www/pacos-website/public/favicon.ico;
        access_log off;
    }

    # Rate Limiting fuer API-Endpunkte (spaeter fuer Kontakt-/Bewerbungsformular)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=5r/m;
    # location /api/ {
    #     limit_req zone=api burst=3 nodelay;
    #     proxy_pass http://localhost:3000;
    # }

    # Reverse Proxy zu Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
